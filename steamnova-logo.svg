<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 380" width="300" height="380">
  <!-- Rocket Gear logo - standalone Concept 2 -->
  <defs>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A5B"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="rocketShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8A5B"/>
      <stop offset="100%" stop-color="#E85A28"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD93D"/>
      <stop offset="60%" stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="flameGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (optional - remove for transparent) -->
  <rect width="300" height="380" fill="#FAFAFA" rx="24"/>

  <!-- Star accents (background) -->
  <circle cx="55" cy="85" r="2.5" fill="#FFD93D"/>
  <circle cx="245" cy="80" r="2" fill="#FFD93D" opacity="0.7"/>
  <circle cx="220" cy="125" r="1.8" fill="#5B8FC0" opacity="0.8"/>
  <circle cx="78" cy="140" r="2" fill="#FF6B35" opacity="0.6"/>
  <circle cx="235" cy="175" r="2.5" fill="#FFD93D" opacity="0.5"/>
  <circle cx="65" cy="200" r="1.8" fill="#FFD93D" opacity="0.6"/>

  <!-- Orbital ring (behind rocket) -->
  <ellipse cx="150" cy="148" rx="80" ry="22" fill="none" stroke="#3A6A9A" stroke-width="2.5" stroke-dasharray="14,7" transform="rotate(-12, 150, 148)" opacity="0.7"/>
  <!-- Small satellites on orbital -->
  <circle cx="78" cy="132" r="4" fill="#FF6B35" opacity="0.8"/>
  <circle cx="222" cy="165" r="3" fill="#5B8FC0" opacity="0.8"/>

  <!-- Rocket body -->
  <g transform="translate(150, 148)">
    <!-- Main body -->
    <path d="M0,-65 C22,-65 32,-38 32,5 L32,22 L-32,22 L-32,5 C-32,-38 -22,-65 0,-65 Z" fill="url(#orangeGrad)"/>

    <!-- Left highlight stripe -->
    <path d="M0,-65 C15,-65 22,-42 25,-10 C18,-28 10,-50 0,-65 Z" fill="#FF9E6B" opacity="0.5"/>

    <!-- Fins -->
    <path d="M-32,5 L-52,30 L-32,22 Z" fill="#CC5429"/>
    <path d="M32,5 L52,30 L32,22 Z" fill="#CC5429"/>
    <!-- Fin highlights -->
    <path d="M-32,5 L-48,28 L-32,20 Z" fill="#FF7A4A" opacity="0.5"/>
    <path d="M32,5 L48,28 L32,20 Z" fill="#FF7A4A" opacity="0.5"/>

    <!-- Window / porthole -->
    <circle cx="0" cy="-25" r="14" fill="#1A1A2E"/>
    <circle cx="0" cy="-25" r="11" fill="#2A4A6A"/>
    <circle cx="-4" cy="-29" r="4" fill="#6BA0D0" opacity="0.6"/>
    <circle cx="3" cy="-22" r="2" fill="#8BC0E8" opacity="0.4"/>

    <!-- Gear exhausts -->
    <!-- Left gear -->
    <g transform="translate(-16, 24)">
      <circle r="16" fill="#1A1A2E"/>
      <rect x="-3.5" y="-21" width="7" height="10" rx="2" fill="#1A1A2E" transform="rotate(0)"/>
      <rect x="-3.5" y="-21" width="7" height="10" rx="2" fill="#1A1A2E" transform="rotate(60)"/>
      <rect x="-3.5" y="-21" width="7" height="10" rx="2" fill="#1A1A2E" transform="rotate(120)"/>
      <rect x="-3.5" y="-21" width="7" height="10" rx="2" fill="#1A1A2E" transform="rotate(180)"/>
      <rect x="-3.5" y="-21" width="7" height="10" rx="2" fill="#1A1A2E" transform="rotate(240)"/>
      <rect x="-3.5" y="-21" width="7" height="10" rx="2" fill="#1A1A2E" transform="rotate(300)"/>
      <circle r="5.5" fill="#FF6B35"/>
    </g>

    <!-- Right gear -->
    <g transform="translate(16, 24)">
      <circle r="16" fill="#1A1A2E"/>
      <rect x="-3.5" y="-21" width="7" height="10" rx="2" fill="#1A1A2E" transform="rotate(15)"/>
      <rect x="-3.5" y="-21" width="7" height="10" rx="2" fill="#1A1A2E" transform="rotate(75)"/>
      <rect x="-3.5" y="-21" width="7" height="10" rx="2" fill="#1A1A2E" transform="rotate(135)"/>
      <rect x="-3.5" y="-21" width="7" height="10" rx="2" fill="#1A1A2E" transform="rotate(195)"/>
      <rect x="-3.5" y="-21" width="7" height="10" rx="2" fill="#1A1A2E" transform="rotate(255)"/>
      <rect x="-3.5" y="-21" width="7" height="10" rx="2" fill="#1A1A2E" transform="rotate(315)"/>
      <circle r="5.5" fill="#FF6B35"/>
    </g>

    <!-- Center flame -->
    <path d="M-10,24 Q0,62 10,24 Z" fill="url(#flameGrad)" filter="url(#flameGlow)" opacity="0.85"/>
    <path d="M-6,24 Q0,48 6,24 Z" fill="#FFE066" opacity="0.9"/>
    <!-- Flame sparks -->
    <circle cx="-8" cy="50" r="2" fill="#FFD93D" opacity="0.7"/>
    <circle cx="7" cy="45" r="1.5" fill="#FF9500" opacity="0.7"/>
    <circle cx="2" cy="58" r="1.8" fill="#FFD93D" opacity="0.6"/>
  </g>

  <!-- Brand name -->
  <text x="150" y="280" font-family="Arial Black, Arial, sans-serif" font-size="38" font-weight="900" fill="#1A1A2E" text-anchor="middle" letter-spacing="-1.5">SteamNova</text>

  <!-- Accent bar -->
  <rect x="55" y="293" width="190" height="4.5" rx="2.25" fill="#FF6B35"/>

  <!-- Tagline -->
  <text x="150" y="316" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle" letter-spacing="3">THINK • BUILD • LAUNCH</text>
</svg>